name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/devonbooker/posture-monitor

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      sha_tag: ${{ steps.vars.outputs.sha_tag }}
    steps:
      - uses: actions/checkout@v4

      - id: vars
        run: echo "sha_tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ steps.vars.outputs.sha_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Hetzner
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            set -euo pipefail
            cd ~/posture-monitor
            docker compose pull
            docker compose up -d
            docker image prune -f

      - name: Health check dashboard
        run: |
          set -e
          # Longer window than a plain API check: Caddy's first Let's Encrypt
          # cert issuance on a fresh volume can take 30-60s before HTTPS serves.
          for i in $(seq 1 24); do
            if curl -fsS --max-time 5 "https://posture.devonbooker.dev/api/results" > /dev/null; then
              echo "Dashboard healthy on attempt $i"
              exit 0
            fi
            echo "Attempt $i: not healthy yet, sleeping 5s"
            sleep 5
          done
          echo "Health check failed after 120s - rollback by pinning the previous :<sha> tag in docker-compose.yml on the VM"
          exit 1
